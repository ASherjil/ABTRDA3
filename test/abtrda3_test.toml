# ABTRDA3 Ping-Pong Test Configuration

[general]
transport        = "packet_mmap"  # "packet_mmap" or "af_xdp"
watchdog_sec     = 60000          # safety timeout (seconds)
ether_type       = 0x88B5         # IEEE local experimental
frame_size       = 64             # Minimum ethernet frame
nic_tuner        = "nfs_safe"      # "off", "nfs_safe" (NFS boot), or "full" (dedicated LAN)
send_interval_us = 1000           # µs between sends (0 = back-to-back, 1000 = 1ms like WR timing)
output           = "/tmp/latencies_packet_mmap_2.txt"

[server]
interface    = "eno1"
mac          = "20:87:56:b6:6a:27"
cpu_core     = 5
xdp_queue_id = 0               # AF_XDP queue to bind (matches NIC queue for this interface)

[client]
interface    = "eno1"
mac          = "d4:f5:27:2a:69:f1"
cpu_core     = 5
xdp_queue_id = 1               # queue 1 = ntuple-steered timing traffic on macb
count        = 50000000            # number of packets to send (overridable with --count)

[packet_mmap]
block_size   = 4096               # must be >= PAGE_SIZE (4096 on x86_64)
block_number = 512                # ring depth (number of frames)

[af_xdp]
umem_frame_size = 2048            # UMEM frame size, must be 2048/4096
frame_count     = 512             # total UMEM frames (split half TX/RX)
need_wakeup     = false           # mode auto-detected: native+zerocopy -> native+copy -> generic+copy


# ip link show enoX
# mkdev16 -> mac address
# eno1 = 20:87:56:b6:6a:27, eno2 = 20:87:56:b6:33:67

# mkdev30 -> mac address
# eno1 = d4:f5:27:2a:69:f1, eno2 = d4:f5:27:2a:a9:59

# mkdev50 -> mac address
# end0 = fc:0f:e7:1b:8b:55

# Server:  sudo ./abtrda3_test --server --config ../../../test/abtrda3_test.toml
# Client:  sudo ./abtrda3_test --client --config ../../../test/abtrda3_test.toml
