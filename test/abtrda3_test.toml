# ABTRDA3 Ping-Pong Test Configuration

[general]
transport    = "packet_mmap" # "packet_mmap" or "af_xdp"
watchdog_sec = 30
ether_type   = 0x88B5       # IEEE local experimental
block_size   = 4096
block_number = 64
frame_size   = 64            # Minimum ethernet frame
skip_nic_tuner = true       # set true for NFS-boot interfaces (e.g. eno1)

[server]
interface = "eno1"
mac       = "20:87:56:b6:6a:27"
cpu_core  = 4

[client]
interface = "eno1"
mac       = "d4:f5:27:2a:69:f1"
cpu_core  = 4

[af_xdp]
queue_id        = 0
umem_frame_size = 4096 # UMEM frame size, must be 2048/4096
frame_count     = 64  # total UMEM frames(split half TX/RX)
zero_copy       = false
need_wakeup     = true   # skip sendto() when kernel is actively draining TX ring